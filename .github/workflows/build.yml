---
name: Build

on:
  push:
    branches:
      - chatterino7
      - "bugfix-release/**"
      - "release/*"
  pull_request:
  workflow_dispatch:
    inputs:
      buildType:
        description: "Build type"
        required: true
        type: choice
        default: "auto"
        options:
          - auto
          - nightly
          - stable
  merge_group:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  C2_ENABLE_LTO: ${{ github.ref == 'refs/heads/chatterino7' || startsWith(github.ref, 'refs/heads/bugfix-release') || startsWith(github.ref, 'refs/heads/release/')}}
  CHATTERINO_REQUIRE_CLEAN_GIT: On
  CHATTERINO_BUILD_TYPE: ${{ case(inputs.buildType != '', inputs.buildType, 'auto') }}
  CONAN_VERSION: 2.28.1

jobs:
  build-ubuntu-docker:
    # Our Ubuntu builds are built using Docker images that have been pre-published.
    # This speeds up builds for us since we do some pre-building of packages that takes a long time
    # However, this means if you need to add a dependency to the build, you'll need to do that
    # in the https://github.com/Chatterino/docker repository first.
    name: "Build Ubuntu in Docker"
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            container: ghcr.io/chatterino/chatterino2-build-ubuntu-22.04:latest
            force-lto: false
            skip-artifact: false
            skip-crashpad: false
            build-appimage: true
            build-deb: true
            plugins: true
          - os: ubuntu-24.04
            container: ghcr.io/chatterino/chatterino2-build-ubuntu-24.04:latest
            force-lto: false
            skip-artifact: false
            skip-crashpad: false
            build-appimage: false
            build-deb: true
            plugins: true
          - os: ubuntu-24.04
            container: ghcr.io/chatterino/chatterino2-build-ubuntu-24.04:latest
            force-lto: false
            skip-artifact: false
            skip-crashpad: false
            build-deb: false
            plugins: false
          - os: ubuntu-26.04
            container: ghcr.io/chatterino/chatterino2-build-ubuntu-26.04:latest
            force-lto: false
            skip-artifact: false
            skip-crashpad: false
            build-deb: true
            plugins: true
    env:
      C2_ENABLE_LTO: ${{ matrix.force-lto }}
      C2_ENABLE_CRASHPAD: ${{ matrix.skip-crashpad == false }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0 # allows for tags access

      - name: Fix git permission error
        run: |
          git config --global --add safe.directory '*'

      - name: Determine build type
        id: build-type
        shell: bash
        run: |
          if [ "${CHATTERINO_BUILD_TYPE}" = "auto" ]; then
            if git describe --exact-match --match 'v*'; then
              echo "Auto - found release tag format"
              echo "NIGHTLY_BUILD=Off" >> "$GITHUB_OUTPUT"
            else
              echo "Auto - did not find release tag format"
              echo "NIGHTLY_BUILD=On" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${CHATTERINO_BUILD_TYPE}" = "nightly" ]; then
            echo "Override to nightly"
            echo "NIGHTLY_BUILD=On" >> "$GITHUB_OUTPUT"
          elif [ "${CHATTERINO_BUILD_TYPE}" = "stable" ]; then
            echo "Override to stable"
            echo "NIGHTLY_BUILD=Off" >> "$GITHUB_OUTPUT"
          else
            echo "Error: no build type variable set"
            exit 1
          fi

      - name: Build
        run: |
          mkdir build
          cd build
          CXXFLAGS=-fno-sized-deallocation cmake \
            -DCMAKE_INSTALL_PREFIX=appdir/usr/ \
            -DCMAKE_BUILD_TYPE=Release \
            -DPAJLADA_SETTINGS_USE_BOOST_FILESYSTEM=On \
            -DUSE_PRECOMPILED_HEADERS=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=On \
            -DCHATTERINO_LTO="$C2_ENABLE_LTO" \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR/lib/cmake" \
            -DCHATTERINO_STATIC_QT_BUILD=On \
            -DCHATTERINO_NIGHTLY_BUILD=${{ steps.build-type.outputs.NIGHTLY_BUILD }} \
            -DFORCE_JSON_GENERATION=Off \
            -DCHATTERINO_PLUGINS=${{ case(matrix.plugins, 'On', 'Off') }} \
            ..
          make -j"$(nproc)"

      - name: Package - AppImage (Ubuntu)
        if: matrix.build-appimage
        run: |
          cd build
          sh ./../.CI/CreateAppImage.sh

      - name: Upload artifact - AppImage (Ubuntu)
        if: matrix.build-appimage
        uses: actions/upload-artifact@v7
        with:
          name: Chatterino-x86_64-Qt-6.7.2.AppImage
          path: build/Chatterino_7TV-x86_64.AppImage

      - name: Package - .deb (Ubuntu)
        if: matrix.build-deb
        run: |
          cd build
          sh ./../.CI/CreateUbuntuDeb.sh

      - name: Upload artifact - .deb (Ubuntu)
        if: matrix.build-deb
        uses: actions/upload-artifact@v7
        with:
          name: Chatterino-${{ matrix.os }}.deb
          path: build/Chatterino-${{ matrix.os }}-x86_64.deb

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0 # tag access
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: chatterino.flatpak
          manifest-path: .CI/com.chatterino.chatterino.yml
          cache-key: flatpak-builder-${{ github.sha }}

  build:
    name: "Build ${{ matrix.os }}, Qt ${{ matrix.qt-version }} (LTO:${{ matrix.force-lto }}, crashpad:${{ case(matrix.skip-crashpad, 'off', 'on') }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            qt-version: 6.9.3
            force-lto: true
            skip-artifact: false
            skip-crashpad: false
          # Windows on ARM
          - os: windows-11-arm
            qt-version: 6.9.3
            force-lto: true
            skip-artifact: false
            skip-crashpad: false
          # macOS (ARM)
          - os: macos-latest
            qt-version: 6.9.3
            force-lto: true
            skip-artifact: false
            skip-crashpad: false

      fail-fast: false
    env:
      C2_ENABLE_LTO: ${{ matrix.force-lto }}
      C2_ENABLE_CRASHPAD: ${{ matrix.skip-crashpad == false }}
      C2_ARCH: ${{ case(endsWith(matrix.os, '-arm') || startsWith(matrix.os, 'macos'), 'arm', 'x86-64') }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0 # allows for tags access

      - name: Determine build type
        id: build-type
        shell: bash
        run: |
          if [ "${CHATTERINO_BUILD_TYPE}" = "auto" ]; then
            if git describe --exact-match --match 'v*'; then
              echo "Auto - found release tag format"
              echo "NIGHTLY_BUILD=Off" >> "$GITHUB_OUTPUT"
            else
              echo "Auto - did not find release tag format"
              echo "NIGHTLY_BUILD=On" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${CHATTERINO_BUILD_TYPE}" = "nightly" ]; then
            echo "Override to nightly"
            echo "NIGHTLY_BUILD=On" >> "$GITHUB_OUTPUT"
          elif [ "${CHATTERINO_BUILD_TYPE}" = "stable" ]; then
            echo "Override to stable"
            echo "NIGHTLY_BUILD=Off" >> "$GITHUB_OUTPUT"
          else
            echo "Error: no build type variable set"
            exit 1
          fi

      - name: Install Qt6
        if: startsWith(matrix.qt-version, '6.')
        uses: jurplel/install-qt-action@v4.3.1
        with:
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache-${{ matrix.qt-version }}-v2
          modules: qtimageformats
          version: ${{ matrix.qt-version }}

      # WINDOWS
      - name: Enable Developer Command Prompt (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: Chatterino/msvc-dev-cmd@v2.0.5
        with:
          arch: ${{env.C2_ARCH == 'arm' && 'arm64' || 'x64' }}

      - name: Setup sccache (Windows)
        # sccache v0.7.4
        uses: hendrikmuhs/ccache-action@v1.2.23
        if: startsWith(matrix.os, 'windows')
        with:
          variant: sccache
          # only save on on the default (master) branch
          save: ${{ github.event_name == 'push' }}
          key: sccache-build-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.qt-version }}-${{ matrix.skip-crashpad }}
          restore-keys: |
            sccache-build-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.qt-version }}

      - name: Cache conan packages (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: actions/cache@v6
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-conan-user-${{ hashFiles('**/conanfile.py') }}-QT6
          path: ~/.conan2/

      - name: Setup Python (Windows)
        uses: actions/setup-python@v6
        if: startsWith(matrix.os, 'windows')
        with:
          python-version: "3.13"

      - name: Install and Setup Conan (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          pip install conan==${{env.CONAN_VERSION}}
          conan --version
          conan profile detect -f
        shell: bash

      - name: Install dependencies (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          mkdir build
          cd build
          conan install .. \
              -s build_type=RelWithDebInfo \
              -c tools.cmake.cmaketoolchain:generator="Ninja" \
              -b missing \
              --output-folder=. \
              -o with_openssl3=True
          conan cache clean --source --build --download "*"
        shell: bash

      - name: Build (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          cd build
          cmake `
              -G Ninja `
              -DCMAKE_BUILD_TYPE=RelWithDebInfo `
              -DCMAKE_TOOLCHAIN_FILE="conan_toolchain.cmake" `
              -DUSE_PRECOMPILED_HEADERS=ON `
              -DBUILD_WITH_CRASHPAD="$Env:C2_ENABLE_CRASHPAD" `
              -DCHATTERINO_LTO="$Env:C2_ENABLE_LTO" `
              -DFORCE_JSON_GENERATION=${{ env.C2_ARCH == 'arm' && 'Off' || 'On' }} `
              -DSKIP_JSON_GENERATION=${{ env.C2_ARCH == 'arm' && 'On' || 'Off' }} `
              -DCHATTERINO_NIGHTLY_BUILD="${{ steps.build-type.outputs.NIGHTLY_BUILD }}" `
              -DFORCE_JSON_GENERATION=Off `
              -DCHATTERINO_SPELLCHECK=On `
              ..
          ninja

      - name: Build crashpad (Windows)
        if: startsWith(matrix.os, 'windows') && !matrix.skip-crashpad
        shell: pwsh
        run: |
          cd build
          ninja chatterino-crash-handler
          mkdir Chatterino2/crashpad
          cp bin/crashpad/crashpad-handler.exe Chatterino2/crashpad/crashpad-handler.exe
          7z a bin/chatterino-${{ env.C2_ARCH }}-Qt-${{ matrix.qt-version }}.pdb.7z bin/chatterino.pdb

      - name: Prepare build dir (windows)
        if: startsWith(matrix.os, 'windows')
        working-directory: build
        run: |
          windeployqt bin/chatterino.exe --release --no-compiler-runtime --no-translations --no-opengl-sw --dir Chatterino2/ --force-openssl
          cp bin/chatterino.exe Chatterino2/
          ..\.CI\deploy-crt.ps1 Chatterino2

      - name: Package (windows)
        if: startsWith(matrix.os, 'windows')
        working-directory: build
        run: |
          mv Chatterino2 Modderino
          7z a chatterino-windows-${{ env.C2_ARCH }}-Qt-${{ matrix.qt-version }}.zip Modderino/

      - name: Upload artifact (Windows - binary)
        if: startsWith(matrix.os, 'windows') && !matrix.skip-artifact
        uses: actions/upload-artifact@v7
        with:
          name: chatterino-windows-${{ env.C2_ARCH }}-Qt-${{ matrix.qt-version }}.zip
          path: build/chatterino-windows-${{ env.C2_ARCH }}-Qt-${{ matrix.qt-version }}.zip

      - name: Upload artifact (Windows - symbols)
        if: startsWith(matrix.os, 'windows') && !matrix.skip-artifact
        uses: actions/upload-artifact@v7
        with:
          name: chatterino-windows-${{ env.C2_ARCH }}-Qt-${{ matrix.qt-version }}-symbols.pdb.7z
          path: build/bin/chatterino-${{ env.C2_ARCH }}-Qt-${{ matrix.qt-version }}.pdb.7z

      # MACOS
      - name: Install dependencies (MacOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          # binary dependencies
          ./.CI/SetupHomebrewDeps.sh boost openssl hunspell
          # build and header-only dependencies
          brew install rapidjson p7zip create-dmg tree
        shell: bash

      - name: Build (MacOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p build
          cd build
          cmake \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
              -DUSE_PRECOMPILED_HEADERS=OFF \
              -DCHATTERINO_LTO="$C2_ENABLE_LTO" \
              -DCHATTERINO_NO_AVIF_PLUGIN=On \
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
              -DFORCE_JSON_GENERATION=Off \
              -DCHATTERINO_NIGHTLY_BUILD=${{ steps.build-type.outputs.NIGHTLY_BUILD }} \
              -DCHATTERINO_SPELLCHECK=On \
              ..
          make -j"$(sysctl -n hw.logicalcpu)"
        shell: bash

      - name: Package (MacOS)
        if: startsWith(matrix.os, 'macos')
        env:
          OUTPUT_DMG_PATH: chatterino-macos-Qt-${{ matrix.qt-version}}-universal.dmg
        run: |
          set -ex
          ls -la
          pwd
          ls -la build || true
          cd build
          export MACOS_CODESIGN_CERTIFICATE="-"
          echo "-> $MACOS_CODESIGN_CERTIFICATE"

          echo "Downloading kimageformats plugins"
          curl -SsfLo kimg.zip "https://github.com/nerixyz/kimageformats-binaries/releases/download/cont/kimageformats-macos-14-${{ matrix.qt-version}}.zip"

          ./../.CI/MacDeploy.sh

          # Copy dynamic library dependencies into the Frameworks directory
          cp /opt/universal-lib/libcrypto.dylib chatterino.app/Contents/Frameworks/libcrypto.3.dylib
          cp /opt/universal-lib/libssl.dylib chatterino.app/Contents/Frameworks/libssl.3.dylib
          cp /opt/universal-lib/libhunspell-1.7.0.dylib chatterino.app/Contents/Frameworks/libhunspell-1.7.0.dylib

          ls -la chatterino.app/Contents/Frameworks

          # Fix the library IDs to match their new location
          install_name_tool -id @executable_path/../Frameworks/libssl.3.dylib chatterino.app/Contents/Frameworks/libssl.3.dylib
          install_name_tool -id @executable_path/../Frameworks/libcrypto.3.dylib chatterino.app/Contents/Frameworks/libcrypto.3.dylib

          otool -L chatterino.app/Contents/Frameworks/libssl.3.dylib
          # Fix the search path for libcrypto in libssl
          otool -L chatterino.app/Contents/Frameworks/libssl.3.dylib \
            | grep libcrypto.3.dylib \
            | cut -d" " -f1 \
            | cut -f2 \
            | while read input_crypto_dylib; do \
                install_name_tool -change \
                  "$input_crypto_dylib" \
                  @executable_path/../Frameworks/libcrypto.3.dylib \
                  chatterino.app/Contents/Frameworks/libssl.3.dylib; \
              done
          # Fix the search path for lib{crypto,ssl,hunspell} in chatterino
          otool -L chatterino.app/Contents/MacOS/chatterino \
            | grep /opt \
            | cut -d" " -f1 \
            | cut -f2 \
            | while read og_entry; do \
                echo $og_entry; \
                install_name_tool -change \
                  "$og_entry" \
                  @executable_path/../Frameworks/$(echo $og_entry | sed -E 's/.*(libssl|libcrypto|libhunspell)/\1/') \
                  chatterino.app/Contents/MacOS/chatterino; \
              done

          ./../.CI/CreateDMG.sh
        shell: bash

      - name: Upload artifact (MacOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: chatterino-macos-Qt-${{ matrix.qt-version }}-universal.dmg
          path: build/chatterino-macos-Qt-${{ matrix.qt-version }}-universal.dmg

  create-release:
    needs: [build-ubuntu-docker, build-flatpak, build]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/chatterino7'
    permissions:
      contents: write # create release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # allows for tags access

      - uses: actions/download-artifact@v8
        name: Download artifacts
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: Rename artifacts
        run: |
          ls -l
          # Rename all artifacts to Modderino
          for f in *; do
            n="${f//chatterino/Modderino}"
            n="${n//Chatterino/Modderino}"
            if [ "$f" != "$n" ]; then
              mv "$f" "$n"
            fi
          done
          if [ -f Modderino_7TV-x86_64.AppImage ]; then
            mv Modderino_7TV-x86_64.AppImage Modderino-x86_64.AppImage
          fi
          # Rename the macos build to indicate that it's for macOS 13.0 users
          mv Modderino-macos-Qt-6.9.3-universal.dmg Modderino-macOS-13.0-universal.dmg
          # Rename Windows ARM64 to indicate that it's not well tested
          mv Modderino-windows-arm-Qt-6.9.3.zip Experimental-ARM64-Modderino-windows-Qt-6.9.3.zip
        working-directory: release-artifacts
        shell: bash

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Format changes
        id: format-changes
        run: |
          delimiter=$(openssl rand -hex 32)
          {
            echo "changelog<<$delimiter"
            python3 ./.CI/format-recent-changes.py
            echo $delimiter
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create release
        uses: ncipollo/release-action@v1.21.0
        with:
          replacesArtifacts: true
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "release-artifacts/*"
          body: ${{ steps.format-changes.outputs.changelog }}
          prerelease: true
          name: Modderino Nightly
          tag: nightly-build

      - name: Update nightly-build tag
        run: |
          git tag -f nightly-build
          git push -f origin nightly-build
        shell: bash
